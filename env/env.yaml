name: qsar_ml_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12.3
  - pip>=26.0
  
pip:
  # Core ML & Data Processing
  - numpy>=1.23.0
  - pandas>=1.5.0
  - scipy>=1.9.0
  - scikit-learn>=1.3.0
  - xgboost>=2.0.0
  
  # Chemistry & Cheminformatics
  - rdkit>=2023.09.0
  
  # Data Serialization & I/O
  - joblib>=1.2.0
  - PyYAML>=6.0
  - pyarrow>=12.0.0
  
  # Visualization & Plotting
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  
  # Optional: For Jupyter Notebook support (uncomment if needed)
  # - jupyter>=1.0.0
  # - jupyterlab>=3.5.0
  # - ipython>=8.0.0

variables:
  PYTHONPATH: /home/lotus/projects/1.5.1ml_simple_QSAR
